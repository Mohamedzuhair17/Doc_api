version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A src.workers.celery_app.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - redis
